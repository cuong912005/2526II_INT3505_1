openapi: 3.0.0
info:
  title: Product CRUD API
  description: RESTful API for managing products
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: http://localhost:5000/api
    description: Development server
  - url: https://api.example.com
    description: Production server

paths:
  /products:
    get:
      summary: Get all products
      operationId: getProducts
      tags:
        - Products
      parameters:
        - name: skip
          in: query
          description: Number of items to skip for pagination
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of items to return
          schema:
            type: integer
            default: 10
        - name: search
          in: query
          description: Search products by name
          schema:
            type: string
      responses:
        '200':
          description: List of products retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a new product
      operationId: createProduct
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /products/{productId}:
    get:
      summary: Get a product by ID
      operationId: getProductById
      tags:
        - Products
      parameters:
        - name: productId
          in: path
          required: true
          description: Product ID
          schema:
            type: string
      responses:
        '200':
          description: Product retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update a product
      operationId: updateProduct
      tags:
        - Products
      parameters:
        - name: productId
          in: path
          required: true
          description: Product ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a product
      operationId: deleteProduct
      tags:
        - Products
      parameters:
        - name: productId
          in: path
          required: true
          description: Product ID
          schema:
            type: string
      responses:
        '204':
          description: Product deleted successfully
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Product:
      type: object
      required:
        - id
        - name
        - description
        - price
        - quantity
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Unique product identifier (MongoDB ObjectId)
        name:
          type: string
          description: Product name
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: Product description
        price:
          type: number
          format: double
          description: Product price
          minimum: 0
        quantity:
          type: integer
          description: Available quantity
          minimum: 0
        sku:
          type: string
          description: Stock Keeping Unit
        category:
          type: string
          description: Product category
        image_url:
          type: string
          description: Product image URL
          format: uri
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp

    ProductInput:
      type: object
      required:
        - name
        - description
        - price
        - quantity
      properties:
        name:
          type: string
          description: Product name
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: Product description
        price:
          type: number
          format: double
          description: Product price
          minimum: 0
        quantity:
          type: integer
          description: Available quantity
          minimum: 0
        sku:
          type: string
          description: Stock Keeping Unit
        category:
          type: string
          description: Product category
        image_url:
          type: string
          description: Product image URL
          format: uri

    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error message
        code:
          type: integer
          description: Error code
        details:
          type: object
          description: Additional error details
